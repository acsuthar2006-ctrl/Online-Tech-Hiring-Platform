<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companies - TechHiring</title>

  <script type="module" crossorigin src="/assets/hiring-companies-Dni5EoNP.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/api-BDkOtMsK.js">
  <link rel="modulepreload" crossorigin href="/assets/notifications-CyUZvoHu.js">
  <link rel="modulepreload" crossorigin href="/assets/dashboard-BJbQFGYd.js">
  <link rel="modulepreload" crossorigin href="/assets/interviewer-sidebar-BBk2cHuw.js">
  <link rel="modulepreload" crossorigin href="/assets/dashboard-utils-BOnXSnva.js">
  <link rel="stylesheet" crossorigin href="/assets/companies-JxOtyRpE.css">
  <link rel="stylesheet" crossorigin href="/assets/common-BQpXi-CY.css">
</head>

<body>
  <div id="sidebar-container"></div>

  <div class="main-content">
    <div class="header">
      <div class="header-left">
        <h1>Hiring Companies</h1>
        <p class="text-muted">Explore opportunities to conduct technical interviews</p>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="notificationBtn">
          <span class="notification-badge" style="display:none;">0</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8A6 6 0 0 0 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" />
            <path
              d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <div class="profile-menu">
          <div class="profile-info">
            <div class="profile-name" id="profileName">Interviewer</div>
            <div class="profile-role">Interviewer</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Search and Filters -->
    <div class="search-section">
      <div class="search-row">
        <div class="search-bar" style="margin-bottom:0;">
          <input type="text" placeholder="Search companies or posts..." id="searchInput">
        </div>
        <select class="filter-select" id="postFilter" style="flex: 0 1 320px;">
          <option value="all">All Posts</option>
        </select>
      </div>
      <div class="status-filters" id="statusFilters">
        <button class="status-filter-btn active" type="button" data-status="all">All</button>
        <button class="status-filter-btn" type="button" data-status="applied">Applied</button>
        <button class="status-filter-btn" type="button" data-status="accepted">Accepted</button>
        <button class="status-filter-btn" type="button" data-status="rejected">Rejected</button>
      </div>
    </div>

    <div class="search-results" style="margin-bottom: 16px; color: var(--gray-600); font-size: 14px;">Showing 8 companies actively hiring interviewers</div>

    <div class="companies-grid" id="companyGrid">
      <!-- Content will be injected by js/hiring-companies.js -->
      <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading hiring companies...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Candidates Modal (shared with dashboard behavior) -->
  <div id="candidatesModal" class="modal-backdrop" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;">
    <div class="modal-content" style="background: white; border-radius: 8px; padding: 24px; min-width: 500px; max-width: 800px; max-height: 80vh; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h2 id="modalTitle" style="margin: 0;">Candidates</h2>
        <button onclick="closeCandidatesModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
      </div>
      <div id="candidatesList">
        <p>Loading candidates...</p>
      </div>
    </div>
  </div>

</body>

</html>

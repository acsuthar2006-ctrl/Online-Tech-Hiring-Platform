<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Admin Dashboard - TechHiring</title>
  <script type="module" crossorigin src="/assets/company-admin-dashboard-D3WIJ-8m.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/api-BDkOtMsK.js">
  <link rel="modulepreload" crossorigin href="/assets/auth-DKe50Cpr.js">
  <link rel="modulepreload" crossorigin href="/assets/notifications-DCH5sCN5.js">
  <link rel="modulepreload" crossorigin href="/assets/notifications-init-AG13z0We.js">
  <link rel="stylesheet" crossorigin href="/assets/common-BQpXi-CY.css">
  <link rel="stylesheet" crossorigin href="/assets/company-admin-hHL8lN8I.css">
</head>

<body>
  <!-- Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <h1>Dashboard</h1>
        <p class="text-muted">Welcome, <span id="adminUsername">Admin</span>!</p>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="notificationBtn">
          <span class="notification-badge" style="display:none;">0</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8A6 6 0 0 0 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" />
            <path
              d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <div class="profile-menu">
          <div class="profile-avatar"
            style="background: linear-gradient(135deg, var(--blue-600), var(--blue-400)); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
            A</div>
          <div>
            <p class="profile-name" id="adminName">Admin</p>
            <p class="profile-role">Company Admin</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="card">
        <div class="stat-content">
          <p class="stat-label">Total Interviews</p>
          <h3 class="stat-value">--</h3>
          <p class="stat-change"></p>
        </div>
      </div>
      <div class="card">
        <div class="stat-content">
          <p class="stat-label">Active Candidates</p>
          <h3 class="stat-value">--</h3>
          <p class="stat-change"></p>
        </div>
      </div>
      <div class="card">
        <div class="stat-content">
          <p class="stat-label">Active Interviewers</p>
          <h3 class="stat-value">--</h3>
          <p class="stat-change"></p>
        </div>
      </div>
      <div class="card">
        <div class="stat-content">
          <p class="stat-label">Hired Candidates</p>
          <h3 class="stat-value">--</h3>
          <p class="stat-change"></p>
        </div>
      </div>
    </div>

    <!-- Recent Activities -->
    <div class="card" style="margin-top: 24px;">
      <div class="card-header">
        <h2>Recent Interview Activities</h2>
        <a href="company-interviews-schedule.html" class="link-primary">View All</a>
      </div>
      <div class="activities-list">
        <p class="text-muted" style="padding:16px;">Loading...</p>
      </div>
    </div>
  </div>

  <script src="../common/admin-sidebar.js"></script>
</body>

</html>

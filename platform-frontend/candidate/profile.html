<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TechHiring</title>
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="css/profile.css">
    <script type="module" src="../common/auth.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

  <!-- Main Content -->
  <main class="main-content">
    <header class="header">
      <div class="header-left">
        <h1>My Profile</h1>
        <p class="text-muted">Manage your personal information and preferences</p>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="notificationBtn">
          <span class="notification-badge" style="display:none;">0</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8A6 6 0 0 0 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" />
            <path
              d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <div class="profile-menu">
          <div class="profile-info">
            <div class="profile-name" id="profileName">User</div>
            <div class="profile-role">Candidate</div>
          </div>
        </div>
      </div>
    </header>

    <div class="profile-container">
      <!-- Profile Header Card -->
      <div class="profile-header-card">
        <div class="profile-banner"></div>
        <div class="profile-header-content">
          <div class="profile-avatar-large">
            <img src="/placeholder.svg?height=120&width=120" alt="Profile">
            <button class="avatar-edit-btn">
            </button>
          </div>
          <div class="profile-info">
            <h2 id="profileUsername">User</h2>
            <p class="text-muted">Interview Candidate</p>
            <div class="profile-meta">
              <span id="memberSince"></span>
            </div>
          </div>
          <button class="btn-primary">Edit Profile</button>
        </div>
      </div>

      <!-- Profile Content Grid -->
      <div class="content-grid">
        <!-- Personal Information Card -->
        <div class="card">
          <div class="card-header">
            <h2>Personal Information</h2>
            <button class="btn-text" id="savePersonalInfoBtn">Save Changes</button>
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-input" id="fullName" placeholder="Enter your full name">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-input" id="email" placeholder="Enter your email">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" class="form-input" id="phone" placeholder="Enter your phone number">
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" class="form-input" id="location" placeholder="Enter your location">
          </div>
          <div class="form-group">
            <label>Bio</label>
            <textarea class="form-input" id="bio" rows="4" placeholder="Tell us about yourself"></textarea>
          </div>
          <div class="form-group">
            <label>Resume (PDF only)</label>
            <div style="display:flex;gap:12px;align-items:center;">
              <input type="file" id="resumeUpload" accept=".pdf" class="form-input" style="flex:1;">
              <button class="btn-outline btn-sm" id="viewResumeBtn" style="display:none;white-space:nowrap;">View Resume</button>
            </div>
          </div>
        </div>

        <!-- Skills Card -->
        <div class="card">
          <div class="card-header">
            <h2>Skills</h2>
            <button class="btn-text" id="manageSkillsBtn">Add Skill</button>
          </div>
          <div class="skills-container" id="skillsContainer">
            <p class="text-muted">No skills added yet.</p>
          </div>
        </div>

        <!-- Experience Card -->
        <div class="card">
          <div class="card-header">
            <h2>Work Experience</h2>
            <button class="btn-text" id="addExperienceBtn">Add Experience</button>
          </div>
          <div class="experience-list" id="experienceList"></div>
        </div>

        <!-- Education Card -->
        <div class="card">
          <div class="card-header">
            <h2>Education</h2>
            <button class="btn-text" id="addEducationBtn">Add Education</button>
          </div>
          <div class="education-list" id="educationList"></div>
        </div>

        <!-- Interview Statistics Card -->
        <div class="card">
          <div class="card-header">
            <h2>Interview Statistics</h2>
          </div>
          <div class="stats-list">
            <div class="stat-item">
              <div class="stat-label-group">
                <span class="stat-dot"></span>
                <span>Total Interviews</span>
              </div>
              <span class="stat-number" id="statTotalInterviews">--</span>
            </div>
            <div class="stat-item">
              <div class="stat-label-group">
                <span class="stat-dot"></span>
                <span>Completed</span>
              </div>
              <span class="stat-number" id="statCompletedInterviews">--</span>
            </div>
            <div class="stat-item">
              <div class="stat-label-group">
                <span class="stat-dot"></span>
                <span>Pending</span>
              </div>
              <span class="stat-number" id="statPendingInterviews">--</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

    <script type="module" src="../common/dashboard.js"></script>
    <script type="module" src="js/profile.js"></script>
    <script type="module" src="../common/sidebar.js"></script>
</body>

</html>

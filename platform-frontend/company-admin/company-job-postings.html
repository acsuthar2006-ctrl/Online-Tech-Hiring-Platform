<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Postings - TechHiring</title>
  <link rel="stylesheet" href="../common/common.css">
  <link rel="stylesheet" href="css/company-admin.css">
  <link rel="stylesheet" href="css/company-job-postings.css">
  <script src="../common/auth.js"></script>
</head>

<body>
  <!-- Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <h1>Job Postings</h1>
        <p class="text-muted">Manage and monitor all your job openings</p>
      </div>
      <button class="btn-primary" onclick="openPostJobModal()">Post New Job</button>
    </div>

    <!-- Job Postings Grid -->
    <div class="jobs-container" id="jobsContainer">
      <!-- Jobs will be dynamically loaded here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M20 6h-2.18c.11-.6.18-1.24.18-1.9C18 2.43 15.57 0 12.5 0S7 2.43 7 5.1c0 .66.07 1.3.18 1.9H5c-2.8 0-5 2.2-5 5v11c0 2.8 2.2 5 5 5h14c2.8 0 5-2.2 5-5V11c0-2.8-2.2-5-5-5zm-6-2c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm6 16H5v-11h14v11z"
          fill="currentColor" opacity="0.3" />
      </svg>
      <h3>No Job Postings Yet</h3>
      <p>Create your first job posting to start hiring</p>
      <button class="btn-primary" onclick="openPostJobModal()">Post Your First Job</button>
    </div>
  </div>

  <!-- Post Job Modal -->
  <div id="postJobModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Post New Job</h2>
        <button class="modal-close" onclick="closePostJobModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Position Title</label>
          <input type="text" id="positionTitle" class="form-input" placeholder="e.g., Senior Software Engineer">
        </div>
        <div class="form-group">
          <label class="form-label">Job Description</label>
          <textarea id="jobDescription" class="form-input" rows="5"
            placeholder="Describe the job role, responsibilities, and requirements..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Salary Range (Min)</label>
            <input type="number" id="salaryMin" class="form-input" placeholder="50000">
          </div>
          <div class="form-group">
            <label class="form-label">Salary Range (Max)</label>
            <input type="number" id="salaryMax" class="form-input" placeholder="120000">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Required Skills (comma-separated)</label>
          <input type="text" id="requiredSkills" class="form-input" placeholder="JavaScript, React, Node.js">
        </div>
        <div class="button-group">
          <button class="btn btn-primary" onclick="postJob()">Post Job</button>
          <button class="btn btn-secondary" onclick="closePostJobModal()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Job Details Modal -->
  <div id="jobDetailsModal" class="modal" style="display: none;">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h2 id="jobTitle">Job Details</h2>
        <button class="modal-close" onclick="closeJobDetailsModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="tabs-container">
          <button class="tab-btn active" onclick="switchJobTab('overview')">Overview</button>
          <button class="tab-btn" onclick="switchJobTab('candidates')">Candidates</button>
          <button class="tab-btn" onclick="switchJobTab('interviewers')">Interviewers</button>
        </div>

        <!-- Overview Tab -->
        <div id="overviewTab" class="tab-content active">
          <div class="job-detail-section">
            <h3>Position Details</h3>
            <div class="detail-item">
              <span class="detail-label">Title:</span>
              <span class="detail-value" id="detailTitle"></span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Status:</span>
              <span class="detail-value detail-status" id="detailStatus"></span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Salary Range:</span>
              <span class="detail-value" id="detailSalary"></span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Required Skills:</span>
              <span class="detail-value" id="detailSkills"></span>
            </div>
            <div class="detail-item full-width">
              <span class="detail-label">Description:</span>
              <p id="detailDescription" style="color: var(--gray-600); margin-top: 8px;"></p>
            </div>
          </div>
        </div>

        <!-- Candidates Tab -->
        <div id="candidatesTab" class="tab-content">
          <div class="applicants-list" id="candidatesList">
            <!-- Candidates will be loaded here -->
          </div>
        </div>

        <!-- Interviewers Tab -->
        <div id="interviewersTab" class="tab-content">
          <div class="applicants-list" id="interviewersList">
            <!-- Interviewers will be loaded here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/company-job-postings.js"></script>
  <script src="../common/admin-sidebar.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Schedule - TechHiring</title>
  <link rel="stylesheet" href="../common/common.css">
  <link rel="stylesheet" href="css/company-admin.css">
  <link rel="stylesheet" href="css/company-interviews-schedule.css">
  <script type="module" src="../common/auth.js"></script>
</head>

<body>
  <!-- Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <h1>Interview Schedule</h1>
        <p class="text-muted">Manage all company interviews</p>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="notificationBtn">
          <span class="notification-badge" style="display:none;">0</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8A6 6 0 0 0 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" />
            <path
              d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <div class="profile-menu">
          <div class="profile-avatar" style="background: linear-gradient(135deg, var(--blue-600), var(--blue-400)); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">A</div>
          <div>
            <p class="profile-name" id="adminName">Admin</p>
            <p class="profile-role">Company Admin</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Filter Buttons -->
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:8px;">
      <div class="filter-buttons" style="margin-bottom:0;">
        <button class="filter-btn active" onclick="filterSchedule('all')">All Interviews</button>
        <button class="filter-btn" onclick="filterSchedule('upcoming')">Upcoming <span class="badge badge-blue" id="upcomingCount" style="margin-left:6px;">0</span></button>
        <button class="filter-btn" onclick="filterSchedule('completed')">Completed <span class="badge badge-green" id="completedCount" style="margin-left:6px;">0</span></button>
      </div>
      <select id="positionFilter" class="form-input" style="max-width:260px;" title="Filter by position">
        <option value="all">All Positions</option>
      </select>
    </div>

    <!-- Schedule Timeline -->
    <div class="schedule-container">
      <p class="text-muted" style="padding:32px;">Loading interviews...</p>
    </div>
  </div>

  <script type="module" src="js/company-interviews-schedule.js"></script>
  <script type="module" src="../common/admin-sidebar.js"></script>
  <script type="module" src="../common/notifications-init.js"></script>
</body>

</html>

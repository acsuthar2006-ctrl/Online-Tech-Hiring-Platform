<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidates - TechHiring</title>
  <link rel="stylesheet" href="../common/common.css">
  <link rel="stylesheet" href="css/company-admin.css">
  <link rel="stylesheet" href="css/company-candidates.css">
  <script type="module" src="../common/auth.js"></script>
</head>

<body>
  <!-- Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <h1>Candidates</h1>
        <p class="text-muted">Total candidates applied</p>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="notificationBtn">
          <span class="notification-badge" style="display:none;">0</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8A6 6 0 0 0 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" />
            <path
              d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <div class="profile-menu">
          <div class="profile-avatar" style="background: linear-gradient(135deg, var(--blue-600), var(--blue-400)); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">A</div>
          <div>
            <p class="profile-name" id="adminName">Admin</p>
            <p class="profile-role">Company Admin</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Search and Filter -->
    <div class="card" style="margin-bottom: 24px;">
      <div class="search-bar">
        <input type="text" id="searchInput" class="form-input" placeholder="Search candidates by name, email, or position...">
        <select id="positionFilter" class="form-input" style="flex: 0.5;">
          <option value="all">All Positions</option>
        </select>
        <select id="statusFilter" class="form-input" style="flex: 0.5;">
          <option value="all">All Status</option>
          <option value="APPLIED">Applied</option>
          <option value="INTERVIEW_SCHEDULED">Interview Scheduled</option>
          <option value="SHORTLISTED">Shortlisted</option>
          <option value="REJECTED">Rejected</option>
          <option value="OFFERED">Offered</option>
        </select>
      </div>
    </div>

    <!-- Candidates Table -->
    <div class="card">
      <table class="candidates-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Position</th>
            <th>Applied Date</th>
            <th>Status</th>
            <th>Score</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="candidatesTableBody">
          <tr>
            <td colspan="7" style="text-align:center; padding:32px; color:var(--gray-500);">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Candidate Details Modal -->
  <div class="modal" id="candidateModal" aria-hidden="true">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h2 id="candidateModalTitle">Candidate Details</h2>
        <button class="modal-close" id="candidateModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <h3>Bio</h3>
          <p id="candidateBio">Loading...</p>
        </div>
        <div class="modal-section">
          <h3>Skills</h3>
          <div id="candidateSkills">Loading...</div>
        </div>
        <div class="modal-section">
          <h3>Work Experience</h3>
          <div id="candidateExperience">Loading...</div>
        </div>
        <div class="modal-section">
          <h3>Education</h3>
          <div id="candidateEducation">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/company-candidates.js"></script>
  <script src="../common/admin-sidebar.js"></script>
  <script type="module" src="../common/notifications-init.js"></script>
</body>

</html>

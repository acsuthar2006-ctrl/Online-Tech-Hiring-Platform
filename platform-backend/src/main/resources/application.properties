spring.application.name=platform-backend

# Active Profile (dev, test, or prod)
# TestEmailRunner only runs in 'dev' and 'test' profiles
spring.profiles.active=dev

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tech_hiring_db}
# spring.datasource.username=postgres
# spring.datasource.password=vrushti
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.show-sql=true

# Security
# For testing REST APIs without CSRF tokens (stateless)
#spring.security.user.name=${SECURITY_USERNAME}
#spring.security.user.password=${SECURITY_PASSWORD}

# Server
server.port=8080

# Application Custom Config
app.cors.allowed-origins=*
app.dummy-data.enabled=${DUMMY_DATA_ENABLED:false}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# connection timeout
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000



# JWT Configuration
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=86400000

# Frontend Deployment URL config
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
